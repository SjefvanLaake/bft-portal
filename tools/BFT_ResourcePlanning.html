<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResourcePlanning — BFT</title>
  <link rel="stylesheet" href="../library/css/bofram-style.css">
  <script src="../library/js/bft-projects.js"></script>
  <script src="../library/js/bft-dialog.js" defer></script>
  <style>
    body { overflow-x: hidden; }
    .rp-page { padding: 16px 20px 80px; }
    .mock-banner { background:rgba(26,110,199,0.08);border:1px solid rgba(26,110,199,0.2);border-radius:6px;padding:8px 14px;margin-bottom:14px;font-family:var(--mono);font-size:10px;color:var(--accent2); }
    .toolbar { display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap; }
    .toolbar .spacer { flex:1; }

    /* Tabel */
    .rp-wrap { overflow:auto;border:1px solid var(--border);border-radius:8px;background:#fff;box-shadow:var(--shadow-md);max-height:calc(100vh - 180px); }
    table.rp-tbl { border-collapse:collapse;font-size:12px;white-space:nowrap; }
    table.rp-tbl th, table.rp-tbl td { border:1px solid var(--border);padding:6px 10px;text-align:center; }
    table.rp-tbl thead th { background:var(--accent-dk);color:#fff;font-family:var(--mono);font-size:11px;font-weight:600;position:sticky;top:0;z-index:3; }
    .rp-th-naam { text-align:left;min-width:160px;position:sticky;left:0;z-index:4;background:var(--accent-dk); }
    .rp-td-naam { text-align:left;font-weight:600;color:var(--text);position:sticky;left:0;z-index:2;background:#fff; }
    .rp-th-disc { min-width:100px;position:sticky;left:160px;z-index:4;background:var(--accent-dk); }
    .rp-td-disc { font-family:var(--mono);font-size:10px;color:var(--muted);position:sticky;left:160px;z-index:2;background:#fff; }
    .rp-th-huidig { background:rgba(232,160,0,0.3)!important;color:#000!important;font-weight:700!important; }
    .rp-td-huidig { background:rgba(232,160,0,0.07)!important; }

    /* Uur-invoer */
    .rp-input { width:52px;border:none;background:transparent;font-family:var(--mono);font-size:11px;font-weight:600;text-align:center;color:var(--text);outline:none;padding:2px; }
    .rp-input:focus { background:rgba(232,160,0,0.12);border-radius:3px; }
    .rp-input.heeft-waarde { color:var(--accent-dk); }
    td:hover .rp-input { background:rgba(232,160,0,0.06);border-radius:3px; }

    /* Totaalrij */
    tr.rp-totaal td { background:var(--surface2);font-weight:700;font-family:var(--mono);font-size:11px; }
    tr.rp-totaal .rp-td-naam, tr.rp-totaal .rp-td-disc { background:var(--surface2); }

    /* Medewerker-beheer */
    .rp-medewerkers { display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px; }
    .rp-mdw-tag { display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-family:var(--mono);font-size:11px;color:var(--text2); }
    .rp-mdw-del { border:none;background:none;cursor:pointer;color:var(--muted);font-size:14px;padding:0;line-height:1; }
    .rp-mdw-del:hover { color:var(--danger); }

    /* Footer */
    .rp-footer { position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 -2px 8px rgba(0,0,0,0.06);z-index:20; }
    .rp-footer-info { flex:1;font-family:var(--mono);font-size:11px;color:var(--muted); }
    .save-ind { font-family:var(--mono);font-size:10px;color:var(--success);opacity:0;transition:opacity 0.3s; }
    .save-ind.zichtbaar { opacity:1; }

    input[type=text] { padding:7px 10px;border:1.5px solid var(--border);border-radius:5px;font-family:var(--mono);font-size:12px;outline:none; }
    input[type=text]:focus { border-color:var(--accent2); }
    select { padding:8px 10px;border:1.5px solid var(--border);border-radius:5px;font-family:var(--mono);font-size:12px;color:var(--text);background:#fff;cursor:pointer; }
  </style>
</head>
<body>

<header class="bf-header">
  <div class="bf-header-left">
    <a href="../index.html" style="color:rgba(255,255,255,0.55);font-family:var(--mono);font-size:11px;text-decoration:none;display:flex;align-items:center;gap:4px;flex-shrink:0">← Portaal</a>
    <div class="bf-logo"></div>
    <div class="bf-header-div"></div>
    <div class="bf-header-title">
      <h1>ResourcePlanning</h1>
      <p id="hdrSub">Capaciteit per medewerker per week</p>
    </div>
  </div>
  <span class="save-ind" id="saveInd">✓ Opgeslagen</span>
  <div class="bf-badge" id="hdrBadge">—</div>
</header>

<div class="rp-page">
  <div class="mock-banner">⚠ Mock-modus — opgeslagen in browser</div>

  <div class="toolbar">
    <select id="projSelect" onchange="laadProject()"></select>
    <select id="jaarSelect" onchange="renderTabel()">
      <option value="2025">2025</option>
      <option value="2026" selected>2026</option>
      <option value="2027">2027</option>
    </select>
    <button class="bf-btn bf-btn-sec" onclick="voegMedewerkerToe()">+ Medewerker</button>
    <button class="bf-btn bf-btn-ghost" onclick="toggleWeergave()">↔ Week/Kwartaal</button>
    <div class="spacer"></div>
    <button class="bf-btn bf-btn-ghost" onclick="exportJSON()">⤓ JSON</button>
  </div>

  <div class="rp-medewerkers" id="mdwLijst"></div>
  <div class="rp-wrap"><div id="rpGrid"><p style="padding:40px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px">Kies een project</p></div></div>
</div>

<div class="rp-footer">
  <div class="rp-footer-info" id="footerInfo">—</div>
  <button class="bf-btn bf-btn-ghost" onclick="resetPlanning()">↺ Wissen</button>
</div>

<script>
const DISCIPLINES = ['Engineering','WVB','Mechanisch','Elektrisch','Service','Overig'];
let huidigProject = null;
let weergave = 'week'; /* 'week' | 'kwartaal' */
/* state: { medewerkers:[{naam,discipline}], uren:{ [naam]:{ [weeknr]: uren } } } */
let state = { medewerkers:[], uren:{} };

function isoWeekCount(jaar) {
  const d = new Date(jaar,11,28);
  const day = d.getDay()||7;
  d.setDate(d.getDate()+4-day);
  const ys = new Date(jaar,0,1);
  return Math.ceil((((d-ys)/86400000)+1)/7);
}
function huidigWeek() {
  const now = new Date();
  const jan4 = new Date(Date.UTC(now.getFullYear(),0,4));
  const day = jan4.getUTCDay()||7;
  const mon = new Date(jan4); mon.setUTCDate(jan4.getUTCDate()-day+1);
  return Math.ceil(((Date.UTC(now.getFullYear(),now.getMonth(),now.getDate())-mon)/86400000+1)/7);
}

window.addEventListener('load',function(){
  const sel = document.getElementById('projSelect');
  sel.innerHTML = '<option value="">— Kies project —</option>' +
    BFT_PROJECTEN.map(p=>`<option value="${p.id}">${p.projectnr} · ${p.naam}</option>`).join('');
  const param = new URLSearchParams(window.location.search).get('project');
  if (param) { sel.value = param; laadProject(); }
});

function laadProject(){
  huidigProject = document.getElementById('projSelect').value;
  if (!huidigProject) return;
  state = { medewerkers:[], uren:{} };
  try { const r=localStorage.getItem('bft_v2_res_'+huidigProject); if(r) state=JSON.parse(r); } catch(e){}
  if (!state.medewerkers) state.medewerkers=[];
  if (!state.uren) state.uren={};
  const proj = BFT_PROJECTEN.find(p=>p.id===huidigProject);
  document.getElementById('hdrSub').textContent = proj ? proj.naam : huidigProject;
  renderMdwLijst();
  renderTabel();
}

function renderMdwLijst(){
  document.getElementById('mdwLijst').innerHTML = state.medewerkers.map((m,i)=>`
    <div class="rp-mdw-tag">
      <span>${m.naam}</span>
      <span style="color:var(--muted);font-size:10px">${m.discipline}</span>
      <button class="rp-mdw-del" onclick="verwijderMdw(${i})">×</button>
    </div>`).join('') || '<span style="font-family:var(--mono);font-size:11px;color:var(--muted)">Nog geen medewerkers — klik + Medewerker</span>';
}

function renderTabel(){
  if (!huidigProject) return;
  const jaar = parseInt(document.getElementById('jaarSelect').value);
  const hw = huidigWeek();
  let kolommen = [];
  if (weergave === 'week') {
    const n = isoWeekCount(jaar);
    for (let w=1;w<=n;w++) kolommen.push({label:'w'+w, key:'w'+jaar+'_'+w, isHuidig: w===hw && jaar===new Date().getFullYear()});
  } else {
    kolommen = ['Q1','Q2','Q3','Q4'].map((q,i)=>({label:q, key:'q'+jaar+'_'+i, isHuidig:false}));
  }

  let totalen = {};
  kolommen.forEach(k=>totalen[k.key]=0);

  const rijen = state.medewerkers.map(m=>{
    const urenMdw = state.uren[m.naam] || {};
    const cellen = kolommen.map(k=>{
      const val = urenMdw[k.key]||0;
      totalen[k.key] += val;
      const cls = k.isHuidig ? 'rp-td-huidig' : '';
      return `<td class="${cls}"><input class="rp-input ${val>0?'heeft-waarde':''}" type="number" min="0" max="80"
        value="${val||''}" placeholder="" data-mdw="${m.naam}" data-key="${k.key}"
        oninput="setUren(this)"></td>`;
    }).join('');
    return `<tr>
      <td class="rp-td-naam">${m.naam}</td>
      <td class="rp-td-disc">${m.discipline}</td>
      ${cellen}
    </tr>`;
  }).join('');

  const totaalCellen = kolommen.map(k=>{
    const v = totalen[k.key];
    const cls = 'rp-td-disc' + (k.isHuidig?' rp-td-huidig':'');
    return `<td class="${cls}" style="color:${v>0?'var(--accent-dk)':'var(--muted)'}">${v||''}</td>`;
  }).join('');

  const thKols = kolommen.map(k=>`<th class="${k.isHuidig?'rp-th-huidig':''}">${k.label}</th>`).join('');

  document.getElementById('rpGrid').innerHTML = `
    <table class="rp-tbl">
      <thead><tr>
        <th class="rp-th-naam">Medewerker</th>
        <th class="rp-th-disc">Discipline</th>
        ${thKols}
      </tr></thead>
      <tbody>
        ${rijen || '<tr><td colspan="999" style="text-align:center;padding:20px;color:var(--muted);font-family:var(--mono);font-size:11px">Nog geen medewerkers toegevoegd</td></tr>'}
        <tr class="rp-totaal">
          <td class="rp-td-naam">Totaal</td>
          <td class="rp-td-disc">—</td>
          ${totaalCellen}
        </tr>
      </tbody>
    </table>`;

  /* Scroll naar huidig week */
  setTimeout(()=>{
    const huidig = document.querySelector('.rp-th-huidig');
    if (huidig) { const wrap=document.querySelector('.rp-wrap'); if(wrap) wrap.scrollLeft=Math.max(0,huidig.offsetLeft-280); }
  },100);

  updateFooter(totalen);
  schrijfSnapshot(totalen);
}

function setUren(input){
  const mdw = input.dataset.mdw;
  const key = input.dataset.key;
  const val = Math.max(0, parseInt(input.value)||0);
  if (!state.uren[mdw]) state.uren[mdw]={};
  if (val) state.uren[mdw][key]=val; else delete state.uren[mdw][key];
  input.classList.toggle('heeft-waarde', val>0);
  slaOp();
  /* Update totaal zonder volledige herrender */
  renderTabel();
}

function voegMedewerkerToe(){
  const naam = prompt('Naam medewerker:')?.trim();
  if (!naam) return;
  if (state.medewerkers.find(m=>m.naam===naam)) { alert('Medewerker bestaat al.'); return; }
  const disc = prompt('Discipline:\n' + DISCIPLINES.map((d,i)=>`${i+1}. ${d}`).join('\n') + '\n\n(typ nummer of naam)') || '1';
  const discipline = DISCIPLINES[parseInt(disc)-1] || disc || 'Overig';
  state.medewerkers.push({naam, discipline});
  slaOp();
  renderMdwLijst();
  renderTabel();
}

function verwijderMdw(i){
  const mdw = state.medewerkers[i];
  if (!mdw || !confirm(`${mdw.naam} verwijderen?`)) return;
  delete state.uren[mdw.naam];
  state.medewerkers.splice(i,1);
  slaOp();
  renderMdwLijst();
  renderTabel();
}

function toggleWeergave(){
  weergave = weergave==='week'?'kwartaal':'week';
  renderTabel();
}

function updateFooter(totalen){
  const totaalUren = Object.values(totalen).reduce((a,b)=>a+b,0);
  document.getElementById('hdrBadge').textContent = totaalUren ? totaalUren+'u' : '—';
  document.getElementById('footerInfo').textContent = `${state.medewerkers.length} medewerkers · ${totaalUren} uur ingepland`;
}

function schrijfSnapshot(totalen){
  if (!huidigProject) return;
  const totaalUren = Object.values(totalen).reduce((a,b)=>a+b,0);
  const disciplines = [...new Set(state.medewerkers.map(m=>m.discipline))];
  try { localStorage.setItem('bft_v2_snap_res_'+huidigProject, JSON.stringify({uren:totaalUren,disciplines,updated:new Date().toISOString()})); } catch(e){}
}

function slaOp(){
  if (!huidigProject) return;
  try { localStorage.setItem('bft_v2_res_'+huidigProject, JSON.stringify(state)); } catch(e){}
  const ind = document.getElementById('saveInd');
  ind.classList.add('zichtbaar');
  clearTimeout(ind._t);
  ind._t = setTimeout(()=>ind.classList.remove('zichtbaar'),1800);
}

function resetPlanning(){
  if (!confirm('Planning wissen?')) return;
  state = {medewerkers:[],uren:{}};
  slaOp(); renderMdwLijst(); renderTabel();
}

function exportJSON(){
  if (!huidigProject) return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
  a.download=`BFT_Resource_${huidigProject}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
</script>
</body>
</html>
