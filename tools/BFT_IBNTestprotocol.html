<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBN Testprotocol — BFT</title>
  <link rel="stylesheet" href="../library/css/bofram-style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.min.js"></script>
  <style>
    /* ── Fase-navigatie (horizontale tabs) ── */
    .ibn-phase-nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 16px;
      position: sticky;
      top: 64px;
      z-index: 50;
    }
    .ibn-phase-nav::-webkit-scrollbar { display: none; }
    .ibn-tab {
      display: flex; align-items: center; gap: 8px;
      padding: 13px 16px;
      border: none; background: none; cursor: pointer;
      font-family: var(--sans); font-size: 12px; color: var(--muted);
      border-bottom: 2px solid transparent;
      white-space: nowrap; transition: all 0.15s;
    }
    .ibn-tab:hover { color: var(--text2); }
    .ibn-tab.actief { color: var(--accent-dk); border-bottom-color: var(--accent); font-weight: 600; }
    .ibn-tab.klaar  { color: var(--success); }
    .ibn-tab.klaar.actief { color: var(--success); border-bottom-color: var(--success); }
    .ibn-tab-dot {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--bg2); border: 1.5px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      color: var(--muted); flex-shrink: 0; transition: all 0.15s;
    }
    .ibn-tab.actief .ibn-tab-dot { background: var(--accent); border-color: var(--accent); color: #000; }
    .ibn-tab.klaar  .ibn-tab-dot { background: var(--success); border-color: var(--success); color: #fff; font-size: 11px; }

    /* ── Shell ── */
    .ibn-shell {
      display: flex;
      min-height: calc(100vh - 128px);
    }

    /* ── Sidebar ── */
    .ibn-sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 12px 0;
      position: sticky;
      top: 128px;
      height: calc(100vh - 128px);
      overflow-y: auto;
    }
    .ibn-sb-label {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
      padding: 6px 16px 4px;
    }
    .ibn-sb-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px; cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.1s; font-size: 12px; color: var(--text2);
    }
    .ibn-sb-item:hover { background: var(--bg2); }
    .ibn-sb-item.actief { border-left-color: var(--accent); background: rgba(232,160,0,0.06); color: var(--text); font-weight: 600; }
    .ibn-sb-item.klaar  { color: var(--success); }
    .ibn-sb-icon {
      width: 18px; height: 18px; border-radius: 3px;
      border: 1.5px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; color: var(--muted); flex-shrink: 0;
    }
    .ibn-sb-item.klaar .ibn-sb-icon { background: var(--success); border-color: var(--success); color: #fff; }
    .ibn-sb-count { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--muted); }

    /* ── Hoofd-content ── */
    .ibn-main { flex: 1; padding: 24px 24px 90px; max-width: 960px; }

    /* ── Mock-banner ── */
    .mock-banner {
      background: rgba(26,110,199,0.08); border: 1px solid rgba(26,110,199,0.2);
      border-radius: 6px; padding: 8px 14px; margin-bottom: 16px;
      font-family: var(--mono); font-size: 10px; color: var(--accent2);
    }

    /* ── Machine-info kaart ── */
    .ibn-info {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 20px; margin-bottom: 20px;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
      gap: 16px; box-shadow: var(--shadow);
    }
    .ibn-info-title {
      grid-column: 1/-1; font-size: 14px; font-weight: 700; color: var(--text);
      padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }

    /* ── Sectie-header ── */
    .ibn-sec { margin-bottom: 24px; scroll-margin-top: 140px; }
    .ibn-sec-head {
      display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
    }
    .ibn-sec-id {
      width: 36px; height: 26px; border-radius: 4px;
      background: var(--accent); color: #000;
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .ibn-sec-id.klaar { background: var(--success); color: #fff; }
    .ibn-sec-titel { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
    .ibn-sec-prog { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .ibn-sec-prog.klaar { color: var(--success); font-weight: 700; }

    /* ── Check-tabel (identiek aan MBCL) ── */
    .ibn-tbl {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; box-shadow: var(--shadow);
    }
    .ibn-tbl-head {
      display: grid; grid-template-columns: 1fr 36px 56px 56px;
      padding: 5px 16px; background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .ibn-tbl-head span {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted);
      text-align: center;
    }
    .ibn-tbl-head span:first-child { text-align: left; }
    .ibn-row {
      display: grid; grid-template-columns: 1fr 36px 56px 56px;
      align-items: center; border-bottom: 1px solid var(--border);
      transition: background 0.1s; min-height: 44px;
    }
    .ibn-row:last-child { border-bottom: none; }
    .ibn-row.is-ok  { background: rgba(30,158,94,0.05); }
    .ibn-row.is-nvt { background: rgba(122,132,154,0.06); }
    .ibn-row-content { padding: 9px 8px 9px 16px; min-width: 0; }
    .ibn-desc { font-size: 12px; color: var(--text); line-height: 1.5; }
    .ibn-row.is-ok  .ibn-desc { text-decoration: line-through; color: var(--muted); }
    .ibn-row.is-nvt .ibn-desc { color: var(--muted); font-style: italic; }
    .ibn-sub  { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
    .ibn-stempel { font-family: var(--mono); font-size: 9px; color: var(--success); margin-top: 3px; display: none; }
    .ibn-row.is-ok .ibn-stempel { display: block; }
    .ibn-note-btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 100%; min-height: 44px;
      border: none; background: transparent; cursor: pointer;
      font-size: 13px; color: var(--muted); transition: all 0.12s;
    }
    .ibn-note-btn:hover { color: var(--accent-dk); background: rgba(232,160,0,0.07); }
    .ibn-note-btn.heeft-note { color: var(--accent-dk); }
    .ibn-chk-col {
      display: flex; align-items: center; justify-content: center;
      height: 100%; min-height: 44px; border-left: 1px solid var(--border);
    }
    .ibn-chk {
      width: 28px; height: 28px; border-radius: 5px;
      border: 1.5px solid var(--border); background: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: all 0.12s; user-select: none; color: transparent;
    }
    .ibn-chk-ok:hover  { border-color: var(--success); color: var(--success); }
    .ibn-chk-nvt:hover { border-color: var(--muted); }
    .ibn-chk-ok.actief  { background: var(--success); border-color: var(--success); color: #fff; }
    .ibn-chk-nvt.actief { background: var(--muted); border-color: var(--muted); color: #fff; font-size: 14px; font-weight: 700; }
    .ibn-note-row {
      max-height: 0; overflow: hidden; transition: max-height 0.2s;
      padding: 0 16px; background: var(--surface);
    }
    .ibn-note-row.open { max-height: 100px; padding: 7px 16px; }
    .ibn-note-ta {
      width: 100%; padding: 6px 10px; border: 1.5px solid var(--border);
      border-radius: 5px; font-family: var(--mono); font-size: 11px;
      color: var(--text); background: #fff; resize: none; height: 56px; outline: none;
    }
    .ibn-note-ta:focus { border-color: var(--accent2); }

    /* ── Gate GO/NOGO ── */
    .ibn-gate {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--accent2); border-radius: 8px;
      padding: 16px 20px; margin: 20px 0;
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    .ibn-gate.go-gate   { border-left-color: var(--success); background: rgba(30,158,94,0.04); }
    .ibn-gate.nogo-gate { border-left-color: var(--danger);  background: rgba(214,48,48,0.04); }
    .ibn-gate-tekst { flex: 1; min-width: 0; }
    .ibn-gate-label { font-size: 13px; font-weight: 600; color: var(--text); }
    .ibn-gate-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: var(--mono); }
    .ibn-gate-status {
      font-family: var(--mono); font-size: 12px; font-weight: 700;
      padding: 4px 12px; border-radius: 4px;
    }
    .ibn-gate-status.go   { background: rgba(30,158,94,0.12); color: var(--success); }
    .ibn-gate-status.nogo { background: rgba(214,48,48,0.10); color: var(--danger); }
    .btn-go, .btn-nogo {
      padding: 8px 18px; border-radius: 5px; border: none;
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; letter-spacing: 0.4px;
    }
    .btn-go   { background: var(--success); color: #fff; }
    .btn-go:hover   { background: #177a48; }
    .btn-nogo { background: rgba(214,48,48,0.10); color: var(--danger); border: 1.5px solid rgba(214,48,48,0.3); }
    .btn-nogo:hover { background: rgba(214,48,48,0.20); }

    /* ── Fase-navigatie onderaan ── */
    .ibn-fase-nav {
      display: flex; justify-content: space-between;
      padding: 16px 0 8px; border-top: 1px solid var(--border); margin-top: 8px;
    }
    .btn-fase {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 18px; border-radius: 5px;
      border: 1.5px solid var(--border); background: var(--surface);
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      color: var(--text2); cursor: pointer; transition: all 0.15s;
    }
    .btn-fase:hover { border-color: var(--accent); color: var(--text); }
    .btn-fase.primary { background: var(--accent); border-color: var(--accent); color: #000; }
    .btn-fase.primary:hover { background: var(--accent-dk); border-color: var(--accent-dk); }
    .btn-fase:disabled { opacity: 0.4; cursor: default; }

    /* ── Fase-header ── */
    .ibn-fase-hdr {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .ibn-fase-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(232,160,0,0.1); border: 1px solid rgba(232,160,0,0.25);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      flex-shrink: 0;
    }
    .ibn-fase-naam { font-size: 16px; font-weight: 700; color: var(--text); }
    .ibn-fase-sub  { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }

    /* ── Progress ring ── */
    .prog-ring { position: relative; flex-shrink: 0; }
    .prog-ring svg { display: block; }
    .prog-pct {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 9px; font-weight: 700; color: #fff;
    }

    /* ── Footer ── */
    .ibn-footer {
      position: fixed; bottom: 0; left: 240px; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 10px 24px; display: flex; align-items: center; gap: 12px;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.06); z-index: 20;
    }
    .ibn-footer-status { flex: 1; font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .save-ind { font-family: var(--mono); font-size: 10px; color: var(--success); opacity: 0; transition: opacity 0.3s; }
    .save-ind.zichtbaar { opacity: 1; }

    /* ── Samenvatting (Vrijgave-fase) ── */
    .ibn-summary-grid {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px;
    }
    .ibn-summary-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 16px; text-align: center; box-shadow: var(--shadow);
    }
    .ibn-sum-num { font-family: var(--mono); font-size: 28px; font-weight: 700; line-height: 1; }
    .ibn-sum-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }
    .ibn-sum-tot { color: var(--text); }
    .ibn-sum-ok  { color: var(--success); }
    .ibn-sum-nvt { color: var(--muted); }
    .ibn-sum-open{ color: var(--danger); }

    .ibn-gates-overzicht {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; box-shadow: var(--shadow); margin-bottom: 20px;
    }
    .ibn-gates-head {
      background: var(--surface2); padding: 10px 16px; font-family: var(--mono);
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted); border-bottom: 1px solid var(--border);
    }
    .ibn-gate-rij {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .ibn-gate-rij:last-child { border-bottom: none; }
    .ibn-gate-fase { font-family: var(--mono); font-weight: 700; color: var(--muted); min-width: 70px; }
    .ibn-gate-naam { flex: 1; color: var(--text2); }
    .ibn-gate-pill {
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      padding: 3px 10px; border-radius: 4px; text-transform: uppercase;
    }
    .ibn-gate-pill.go   { background: rgba(30,158,94,0.12); color: var(--success); }
    .ibn-gate-pill.nogo { background: rgba(214,48,48,0.10); color: var(--danger); }
    .ibn-gate-pill.open { background: var(--bg2); color: var(--muted); }

    @media (max-width: 700px) {
      .ibn-sidebar { display: none; }
      .ibn-footer { left: 0; }
      .ibn-summary-grid { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="bf-header">
  <div class="bf-header-left">
    <a href="../index.html" title="Terug naar portaal"
       style="color:rgba(255,255,255,0.55);font-family:var(--mono);font-size:11px;text-decoration:none;display:flex;align-items:center;gap:4px;flex-shrink:0">
      ← Portaal
    </a>
    <div class="bf-logo"></div>
    <div class="bf-header-div"></div>
    <div class="bf-header-title">
      <h1>IBN Testprotocol</h1>
      <p id="hdrSub">Machine testen — in bedrijf nemen</p>
    </div>
  </div>
  <span class="save-ind" id="saveInd">✓ Opgeslagen</span>
  <div class="prog-ring" title="Totale voortgang">
    <svg width="42" height="42">
      <circle cx="21" cy="21" r="17" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
      <circle id="progCircle" cx="21" cy="21" r="17" fill="none" stroke="#e8a000"
        stroke-width="3" stroke-dasharray="106.8" stroke-dashoffset="106.8"
        stroke-linecap="round" transform="rotate(-90 21 21)"/>
    </svg>
    <div class="prog-pct" id="progPct">0%</div>
  </div>
</header>

<!-- Fase-tabs -->
<nav class="ibn-phase-nav" id="faseNav"></nav>

<!-- Shell -->
<div class="ibn-shell">
  <aside class="ibn-sidebar" id="sidebar">
    <div style="padding:14px 16px;border-bottom:1px solid var(--border);background:var(--surface2)">
      <div class="ibn-sb-label" style="margin-bottom:8px">Project</div>
      <select id="projSelect" onchange="laadProject()"
        style="width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:5px;font-family:var(--mono);font-size:11px;color:var(--text);background:#fff;cursor:pointer">
      </select>
    </div>
    <div id="sidebarSections"></div>
  </aside>
  <main class="ibn-main" id="mainContent">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(--muted);font-family:var(--mono);font-size:12px;gap:12px">
      <div style="font-size:40px;opacity:0.3">🔧</div>
      <div>Kies een project in de sidebar links</div>
    </div>
  </main>
</div>

<!-- Footer -->
<div class="ibn-footer" id="ibnFooter">
  <div class="ibn-footer-status" id="footerStatus">— kies een project —</div>
  <button class="bf-btn bf-btn-ghost" onclick="resetProtocol()">↺ Wissen</button>
  <button class="bf-btn bf-btn-primary" id="pdfBtn" onclick="exportPDF()">↓ PDF</button>
</div>

<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<script src="../library/js/bft-projects.js"></script>
<script src="../library/js/bft-pdf-logo.js"></script>
<script src="../library/js/bft-pdf.js"></script>
<script src="../library/js/bft-tool-shell.js" defer></script>
<script src="../library/js/bft-auth.js" defer></script>
<script src="../library/js/bft-dialog.js" defer></script>
<script src="../library/js/bft-wizard.js" defer></script>
<script src="../library/js/bft-deadline.js" defer></script>

<script>
/* ================================================================
   FASE-DATA
   ================================================================ */
const FASEN = [
  {
    id: 0, titel: 'Machine-identificatie', icon: '📋',
    sub: 'Algemene gegevens vastleggen vóór teststart',
    type: 'info', sections: []
  },
  {
    id: 1, titel: 'Pre-Power Check', icon: '⚡',
    sub: 'Veiligheidscheck vóór eerste inschakeling — PSSR Gate 1',
    gate: { label: 'Gate 1 — Akkoord om spanning op te zetten?', sub: 'Alle items afgevinkt, punch list leeg of geaccepteerd' },
    sections: [
      { id:'1A', titel:'Mechanische inspectie', items:[
        {id:'1A-01',desc:'Machine vrij van transportschade — visuele inspectie behuizing, aansluitingen, leidingen'},
        {id:'1A-02',desc:'Alle bevestigingen en bouten vast en correct aangedraaid'},
        {id:'1A-03',desc:'Veiligheidskappen en beschermplaten aangebracht'},
        {id:'1A-04',desc:'Werkruimte rondom machine vrij en veilig'},
        {id:'1A-05',desc:'Vloeistofniveaus gecontroleerd: hydrauliekolie, smeerolie, koelvloeistof',sub:'Noteer niveaus bij opmerking'},
        {id:'1A-06',desc:'Leidingverbindingen drukloos en lekkagevrij voor inschakeling'},
        {id:'1A-07',desc:'Motorkoppelingen / aandrijfassen vrij van obstakels — hand-ronddraaitest'}
      ]},
      { id:'1B', titel:'Elektrische pre-check', items:[
        {id:'1B-01',desc:'Voedingsspanning op kast gecontroleerd (3-fase aanwezig, volgorde juist)',sub:'Noteer gemeten spanning L1–L2–L3'},
        {id:'1B-02',desc:'Noodstop-knoppen aanwezig en mechanisch vrij',sub:'Controleer alle E-stop locaties'},
        {id:'1B-03',desc:'Aardlekschakelaar / isolatiemeting uitgevoerd (> 1 MΩ)',sub:'Noteer gemeten waarde'},
        {id:'1B-04',desc:'Zekeringen / motorbeveiligers uitgeschakeld / correct geplaatst',sub:'Zie zekeringsschema'},
        {id:'1B-05',desc:'Alle LOGO-modules en uitbreidingen correct gestoken / bekabeld'},
        {id:'1B-06',desc:'PE-aansluitingen gecontroleerd (behuizing, motoren)'},
        {id:'1B-07',desc:'Aansluitschema beschikbaar en overeenkomstig uitgevoerd',sub:'P&ID + E-schema'}
      ]}
    ]
  },
  {
    id: 2, titel: 'Besturingskast', icon: '🗄',
    sub: 'Spanning op kast, controller boot, parameters laden',
    gate: { label: 'Gate 2 — Besturingskast functioneel akkoord?', sub: 'Controller OK, communicatie OK, parameters geladen' },
    sections: [
      { id:'2A', titel:'Spanningopbouw', items:[
        {id:'2A-01',desc:'Hoofdzekering F7 (2A) ingeschakeld — 24VDC voeding OK'},
        {id:'2A-02',desc:'Fase-zekeringen F8 (7,5A) en F30 (0,5A) ingeschakeld',sub:'F30 = softstarter controlecircuit'},
        {id:'2A-03',desc:'Spanning gemeten op kast: IL1 / IL2 / IL3 (voedingssteker)',sub:'Noteer 3x spanning'},
        {id:'2A-04',desc:'Faserelais K16 check — alle 3 fasen aanwezig'},
        {id:'2A-05',desc:'Controleer fasevolgorde — bij generatorbedrijf: 400VAC op alle fasen'}
      ]},
      { id:'2B', titel:'Controller & software', items:[

/* Projectdata uit gedeeld bft-projects.js */

/* ================================================================
   STATE
   checks    : { [itemId]: { status:'ok'|'nvt', monteur, ts } }
   notes     : { [itemId]: string }
   gates     : { [faseId]: 'go'|'nogo'|null }
   machineInfo: { chassis, tester, locatie, datum }
   actieveFase: 0
   ================================================================ */
let huidigProject = null;
let monteurNaam   = '';
let actieveFase   = 0;
let state = { checks:{}, notes:{}, gates:{}, machineInfo:{ chassis:'', tester:'', locatie:'', datum:'' } };

/* ================================================================
   I/O-IMPORT (Fase 3) — vervangt de testvragen door geïmporteerde I/O.
   Omkeerbaar: het origineel wordt bewaard en kan worden teruggezet.
   Importeert ALLEEN de vragen (klem + functie); uitroeptekens worden gestript.
   ================================================================ */
let _fase3orig = null;
function fase3(){ return FASEN.find(f => f.id === 3); }
function bewaarFase3Origineel(){ if (!_fase3orig) _fase3orig = JSON.parse(JSON.stringify(fase3().sections)); }
function ioMelding(m){ if (window.BFTDialog && BFTDialog.alert) BFTDialog.alert(m); else alert(m); }

/* '!test...!' → 'test...' : alle uitroeptekens weg */
function stripBang(s){ return String(s == null ? '' : s).replace(/!/g, '').replace(/\s+/g, ' ').trim(); }

/* Korte code voor het sectie-blokje (past in de 36px-badge): Logo1 → L1 */
function ctrlKort(ctrl){
  const m = String(ctrl).match(/(\d+)/);
  return (/logo/i.test(ctrl) && m) ? 'L' + m[1] : String(ctrl).slice(0, 3).toUpperCase();
}

/* io[] → Fase-3 secties, gegroepeerd per controller (alleen de vragen) */
function bouwIOSecties(io){
  const perCtrl = {};
  io.forEach(x => { (perCtrl[x.controller || 'I/O'] = perCtrl[x.controller || 'I/O'] || []).push(x); });
  return Object.keys(perCtrl).map(ctrl => ({
    id: ctrlKort(ctrl),
    titel: ctrl + ' — I/O',
    items: perCtrl[ctrl].map(x => ({
      id: x.id || (ctrl + '-' + x.klem),
      desc: stripBang((x.klem ? x.klem + ' — ' : '') + (x.functie || '')),
      sub: ctrl + (x.richting ? ' · ' + (x.richting === 'in' ? 'ingang' : 'uitgang') : '') + (x.soort === 'analoog' ? ' · analoog' : '')
    }))
  }));
}
function pasIOToe(io){ fase3().sections = bouwIOSecties(io); }

/* Import-balk bovenaan Fase 3 (huidige CSS-stijl) */
function importBarHtml(){
  const n = (state.io && state.io.length) || 0;
  return `
    <div style="background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent,#e8a000);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:200px">
        <div style="font-weight:700;font-size:13px">📥 I/O-import</div>
        <div style="font-size:11px;color:var(--muted);font-family:var(--mono)">${n ? n + ' I/O geïmporteerd — testvragen geladen' : 'Importeer de I/O (io.json) om de testvragen te laden'}</div>
      </div>
      <input type="file" id="ioFile" accept=".json,application/json" hidden onchange="importeerIOBestand(this.files[0]); this.value='';">
      <button class="btn-fase" onclick="document.getElementById('ioFile').click()">${n ? 'Her-importeren' : 'Importeer I/O'}</button>
      ${n ? `<button class="btn-fase" style="border-color:var(--danger);color:var(--danger)" onclick="verwijderImport()">Verwijder import</button>` : ''}
    </div>`;
}

async function importeerIOBestand(file){
  if (!file) return;
  if (!huidigProject) { ioMelding('Kies eerst een project.'); return; }
  let doc;
  try { doc = JSON.parse(await file.text()); } catch(e){ ioMelding('Geen geldige JSON.'); return; }
  const io = Array.isArray(doc) ? doc : (Array.isArray(doc.io) ? doc.io : null);
  if (!io || !io.length) { ioMelding('Geen I/O gevonden (verwacht een io[]-array).'); return; }
  bewaarFase3Origineel();
  state.io = io;
  pasIOToe(io);
  slaOp();
  switchFase(3);
}

function verwijderImport(){
  if (!confirm('Import verwijderen en terug naar de standaard I/O-lijst?')) return;
  bewaarFase3Origineel();
  delete state.io;
  fase3().sections = JSON.parse(JSON.stringify(_fase3orig));
  slaOp();
  switchFase(3);
}

/* ================================================================
   PROJECT LADEN
   ================================================================ */
function laadProject() {
  const id = document.getElementById('projSelect').value;
  if (!id) return;
  huidigProject = id;
  state = { checks:{}, notes:{}, gates:{}, machineInfo:{ chassis:'', tester:'', locatie:'', datum:'' } };
  try { const r = localStorage.getItem('bft_v2_ibn_' + id); if (r) state = JSON.parse(r); } catch(e){}
  if (!state.machineInfo) state.machineInfo = { chassis:'', tester:'', locatie:'', datum:'' };
  if (!state.gates) state.gates = {};
  /* migratie: oude string-gates ('go'/'nogo') → audit-object {besluit,tester,ts,reden} */
  Object.keys(state.gates).forEach(k => {
    if (typeof state.gates[k] === 'string') state.gates[k] = { besluit: state.gates[k], tester: '', ts: '', reden: '' };
  });
  /* I/O-import per project: Fase 3 terug naar origineel, daarna eventuele import herstellen */
  bewaarFase3Origineel();
  fase3().sections = JSON.parse(JSON.stringify(_fase3orig));
  if (Array.isArray(state.io) && state.io.length) pasIOToe(state.io);
  const proj = BFTToolShell.getProject(id) || {};
  document.getElementById('hdrSub').textContent = proj.naam || id;
  monteurNaam = BFTToolShell.monteur.laad();
  renderFaseNav();
  switchFase(actieveFase);

  toonDeadline(proj);        /* opleverdatum-waarschuwing bij project-open */
}

/* ================================================================
   OPLEVERDATUM-WAARSCHUWING — popup bij project-open (1×, via bft-deadline.js)
   Open item = checklist-item zonder status, in fases ≠ info/vrijgave
   (identiek aan de wizard-getItems-definitie). Gates tellen niet mee.
   ================================================================ */
function ibnTelFasen() {
  return FASEN.filter(f => f.type !== 'info' && f.type !== 'vrijgave');
}
function ibnOpenCount() {
  let n = 0;
  ibnTelFasen().forEach(f => (f.sections || []).forEach(s => (s.items || []).forEach(it => {
    if (!state.checks[it.id]?.status) n++;
  })));
  return n;
}
function ibnTotalCount() {
  let n = 0;
  ibnTelFasen().forEach(f => (f.sections || []).forEach(s => { n += (s.items || []).length; }));
  return n;
}
function toonDeadline(proj) {
  if (!window.BFTDeadline || !proj || !proj.oplevering) return;
  BFTDeadline.register({
    name:          'IBN-testprotocol · ' + (proj.naam || huidigProject),
    key:           huidigProject,        /* dedup: 1× per project per tool-open */
    getDeadline:   () => proj.oplevering,
    getOpenCount:  ibnOpenCount,
    getTotalCount: ibnTotalCount
  });
}

window.addEventListener('load', function() {
  const param = BFTToolShell.leesParam();
  BFTToolShell.vulSelect(document.getElementById('projSelect'), param || '');
  if (param) laadProject();
  BFTToolShell.initBackend().then(() => { monteurNaam = BFTToolShell.monteur.naam() || monteurNaam; });

  if (typeof BFTWizard !== 'undefined') {
    BFTWizard.register({
      name: 'IBN Testprotocol',
      canStart: function () {   /* wizard alleen als de tester/monteur is ingevuld (IBN-actor = tester-veld) */
        const t = (state.machineInfo && state.machineInfo.tester || '').trim();
        if (t) return true;
        const inp = document.getElementById('inf-tester');
        if (inp) { inp.focus(); inp.style.borderColor = 'var(--danger)'; setTimeout(() => { inp.style.borderColor = ''; }, 1500); }
        BFTToolShell.toast('Vul eerst de tester/monteur in (machinegegevens)');
        return false;
      },
      getItems: function () {
        const items = [];
        FASEN.filter(f => f.type !== 'info' && f.type !== 'vrijgave').forEach(f =>
          f.sections.forEach(s => s.items.forEach(it => {
            if (!state.checks[it.id]?.status)
              items.push({ id: it.id, label: it.desc, sub: `Fase ${f.id} · ${s.id}: ${s.titel}`, currentStatus: 'open', currentNote: state.notes[it.id] || '' });
          }))
        );
        return items;
      },
      setStatus: function (id, status, note) {
        /* tester/monteur verplicht — stempel de tester (IBN-actor), nooit een nep-actor */
        const m = (state.machineInfo && state.machineInfo.tester || '').trim();
        if ((status === 'gedaan' || status === 'nvt') && !m) { BFTToolShell.toast('Vul eerst de tester/monteur in (machinegegevens)'); return; }
        if (status === 'gedaan') state.checks[id] = { status:'ok', monteur: m, ts: new Date().toISOString() };
        else if (status === 'nvt') state.checks[id] = { status:'nvt', monteur: m, ts: new Date().toISOString() };
        else delete state.checks[id];
        if (typeof note === 'string') { if (note.trim()) state.notes[id] = note; else delete state.notes[id]; }
        slaOp(); updateRij(id); updateVoortgang(); renderSidebar(); renderFaseNav();
      }
    });
  }
});

/* ================================================================
   FASE-NAV
   ================================================================ */
function renderFaseNav() {
  document.getElementById('faseNav').innerHTML = FASEN.map((f, i) => {
    const klaar = faseKlaar(f);
    return `<button class="ibn-tab ${f.id === actieveFase ? 'actief' : ''} ${klaar ? 'klaar' : ''}"
      onclick="switchFase(${f.id})">
      <span class="ibn-tab-dot">${klaar ? '✓' : i}</span>
      ${f.icon} ${f.titel}
    </button>`;
  }).join('');
}

function faseKlaar(f) {
  if (f.type === 'info') return infoCompleet();
  return f.sections.every(s => s.items.every(it => state.checks[it.id]?.status));
}

function infoCompleet() {
  const m = state.machineInfo;
  return ['chassis','tester','datum'].every(k => String(m[k]||'').trim());
}

/* ================================================================
   FASE WISSELEN
   ================================================================ */
function switchFase(id) {
  if (!huidigProject) return;
  if (id !== 0 && !infoCompleet()) {
    if (window.BFTDialog) BFTDialog.alert('Vul eerst de machine-identificatie in (Chassis, Tester, Datum).');
    id = 0;
  }
  actieveFase = id;
  renderFaseNav();
  renderSidebar();
  renderContent();
  updateVoortgang();
}

/* ================================================================
   SIDEBAR
   ================================================================ */
function renderSidebar() {
  const fase = FASEN.find(f => f.id === actieveFase);
  const sb = document.getElementById('sidebarSections');
  if (!fase || !fase.sections.length) { sb.innerHTML = ''; return; }
  sb.innerHTML = '<div class="ibn-sb-label" style="margin-top:8px">Secties</div>' +
    fase.sections.map(s => {
      const t = telSec(s);
      const klaar = t.done + t.nvt === t.totaal;
      return `<div class="ibn-sb-item ${klaar ? 'klaar' : ''}" onclick="scrollNaarSec('${s.id}')">
        <div class="ibn-sb-icon">${klaar ? '✓' : ''}</div>
        <span>${s.id} ${s.titel}</span>
        <span class="ibn-sb-count">${t.done + t.nvt}/${t.totaal}</span>
      </div>`;
    }).join('');
}

function scrollNaarSec(id) {
  document.getElementById('sec-' + id)?.scrollIntoView({ behavior:'smooth', block:'start' });
}

function telSec(s) {
  let done = 0, nvt = 0;
  s.items.forEach(it => {
    const st = state.checks[it.id]?.status;
    if (st === 'ok') done++;
    if (st === 'nvt') nvt++;
  });
  return { totaal: s.items.length, done, nvt };
}

/* ================================================================
   HOOFD-CONTENT
   ================================================================ */
function renderContent() {
  const fase = FASEN.find(f => f.id === actieveFase);
  const mc = document.getElementById('mainContent');
  if (!fase) { mc.innerHTML = ''; return; }
  if (fase.type === 'info') { mc.innerHTML = renderMachineInfo(); return; }
  if (fase.type === 'vrijgave') { mc.innerHTML = renderVrijgave(fase); return; }
  mc.innerHTML = renderFase(fase);
}

function renderMachineInfo() {
  const m = state.machineInfo;
  const proj = BFTToolShell.getProject(huidigProject) || {};
  return `
    ${BFTToolShell.mockBanner()}
    <div class="ibn-fase-hdr">
      <div class="ibn-fase-icon">📋</div>
      <div><div class="ibn-fase-naam">Machine-identificatie</div>
      <div class="ibn-fase-sub">Vul alle velden in voor je begint</div></div>
    </div>
    <div class="ibn-info">
      <div class="ibn-info-title">Machine- en testgegevens</div>
      <div class="bf-field"><label>Project</label>
        <input type="text" class="bf-input" value="${huidigProject}" readonly style="background:var(--bg2)"></div>
      <div class="bf-field"><label>Machine / Chassis-nr <span style="color:var(--danger)">*</span></label>
        <input type="text" class="bf-input" id="inf-chassis" value="${m.chassis||''}"
          placeholder="bijv. BFMR2000EK-001" oninput="slaInfoOp()"></div>
      <div class="bf-field"><label>Klant</label>
        <input type="text" class="bf-input" value="${proj.klant||''}" readonly style="background:var(--bg2)"></div>
      <div class="bf-field"><label>Tester / Monteur <span style="color:var(--danger)">*</span></label>
        <input type="text" class="bf-input" id="inf-tester" value="${m.tester || monteurNaam || ''}"
          placeholder="Naam tester" oninput="slaInfoOp()"></div>
      <div class="bf-field"><label>Testdatum <span style="color:var(--danger)">*</span></label>
        <input type="date" class="bf-input" id="inf-datum" value="${m.datum||''}"
          oninput="slaInfoOp()"></div>
    </div>
    <div class="ibn-fase-nav">
      <div></div>
      <button class="btn-fase primary" onclick="switchFase(1)">Fase 1 → Pre-Power Check</button>
    </div>
  `;
}

function slaInfoOp() {
  state.machineInfo = {
    chassis: document.getElementById('inf-chassis')?.value || '',
    tester:  document.getElementById('inf-tester')?.value  || '',
    datum:   document.getElementById('inf-datum')?.value   || ''
  };
  if (state.machineInfo.tester) monteurNaam = state.machineInfo.tester;
  slaOp();
  renderFaseNav();
}

function renderFase(fase) {
  const fIdx = FASEN.indexOf(fase);
  const prev = fIdx > 0 ? FASEN[fIdx - 1] : null;
  const next = fIdx < FASEN.length - 1 ? FASEN[fIdx + 1] : null;
  const gate = fase.gate;
  const gs = state.gates[fase.id] || null;

  return `
    ${BFTToolShell.mockBanner()}
    <div class="ibn-fase-hdr">
      <div class="ibn-fase-icon">${fase.icon}</div>
      <div><div class="ibn-fase-naam">Fase ${fase.id} — ${fase.titel}</div>
      <div class="ibn-fase-sub">${fase.sub || ''}</div></div>
    </div>
    ${fase.id === 3 ? importBarHtml() : ''}
    ${fase.sections.map(s => renderSectie(s)).join('')}
    ${gate ? renderGate(fase.id, gate, gs) : ''}
    <div class="ibn-fase-nav">
      <button class="btn-fase" onclick="switchFase(${prev?.id ?? 0})" ${!prev ? 'disabled' : ''}>
        ← ${prev ? prev.titel : ''}
      </button>
      <button class="btn-fase primary" onclick="switchFase(${next?.id ?? 7})" ${!next ? 'disabled' : ''}>
        ${next ? next.titel : ''} →
      </button>
    </div>
  `;
}

function renderVrijgave(fase) {
  let totaal = 0, gedaan = 0, nvt = 0;
  FASEN.filter(f => f.type !== 'info').forEach(f =>
    f.sections.forEach(s => s.items.forEach(it => {
      totaal++;
      const st = state.checks[it.id]?.status;
      if (st === 'ok') gedaan++;
      if (st === 'nvt') nvt++;
    }))
  );
  const open = totaal - gedaan - nvt;

  const esc = BFTToolShell.esc;
  const gatesFasen = FASEN.filter(f => f.gate);
  const alleGo    = gatesFasen.length > 0 && gatesFasen.every(f => (state.gates[f.id] || {}).besluit === 'go');
  const enigeNogo = gatesFasen.some(f => (state.gates[f.id] || {}).besluit === 'nogo');
  const vrijgegeven = alleGo && open === 0 && !enigeNogo;
  const redenNiet = enigeNogo ? 'er is een NOGO-gate' : open > 0 ? `${open} open item(s)` : 'niet alle gates op GO';
  const releaseStijl = vrijgegeven
    ? 'background:rgba(30,158,94,0.12);color:var(--success);border:1px solid rgba(30,158,94,0.3)'
    : 'background:rgba(214,48,48,0.10);color:var(--danger);border:1px solid rgba(214,48,48,0.3)';

  return `
    ${BFTToolShell.mockBanner()}
    <div class="ibn-fase-hdr">
      <div class="ibn-fase-icon">📦</div>
      <div><div class="ibn-fase-naam">Vrijgave & verzendgereed</div>
      <div class="ibn-fase-sub">Samenvatting + documentatie afronden</div></div>
    </div>

    <div style="padding:12px 16px;border-radius:8px;margin-bottom:16px;font-weight:700;font-family:var(--mono);font-size:13px;${releaseStijl}">
      ${vrijgegeven ? '✓ VRIJGEGEVEN — alle gates GO, geen open items' : `⚠ NIET VRIJGEGEVEN — ${redenNiet}`}
    </div>

    <div class="ibn-summary-grid">
      <div class="ibn-summary-card"><div class="ibn-sum-num ibn-sum-tot">${totaal}</div><div class="ibn-sum-lbl">Totaal items</div></div>
      <div class="ibn-summary-card"><div class="ibn-sum-num ibn-sum-ok">${gedaan}</div><div class="ibn-sum-lbl">Afgevinkt</div></div>
      <div class="ibn-summary-card"><div class="ibn-sum-num ibn-sum-nvt">${nvt}</div><div class="ibn-sum-lbl">N.v.t.</div></div>
      <div class="ibn-summary-card"><div class="ibn-sum-num ibn-sum-open">${open}</div><div class="ibn-sum-lbl">Open</div></div>
    </div>

    <div class="ibn-gates-overzicht">
      <div class="ibn-gates-head">Gate-overzicht</div>
      ${gatesFasen.map(f => {
        const gs = state.gates[f.id] || null;
        const besluit = gs && gs.besluit;
        const pill = besluit === 'go' ? 'go' : besluit === 'nogo' ? 'nogo' : 'open';
        const txt  = besluit === 'go' ? 'GO' : besluit === 'nogo' ? 'NOGO' : 'Open';
        const door = (besluit && gs.tester) ? ` <span style="color:var(--muted);font-family:var(--mono);font-size:9px">(${esc(gs.tester)})</span>` : '';
        const reden = (besluit === 'nogo' && gs.reden) ? `<div style="color:var(--danger);font-size:10px;margin-top:2px">Reden: ${esc(gs.reden)}</div>` : '';
        return `<div class="ibn-gate-rij">
          <span class="ibn-gate-fase">Gate ${f.id}</span>
          <span class="ibn-gate-naam">${esc(f.gate.label)}${door}${reden}</span>
          <span class="ibn-gate-pill ${pill}">${txt}</span>
        </div>`;
      }).join('')}
    </div>

    ${fase.sections.map(s => renderSectie(s)).join('')}

    <div class="ibn-fase-nav">
      <button class="btn-fase" onclick="switchFase(6)">← Fase 6</button>
      <button class="btn-fase primary" id="pdfBtn2" onclick="exportPDF()">↓ Download PDF</button>
    </div>
  `;
}

function renderSectie(s) {
  const t = telSec(s);
  const klaar = t.done + t.nvt === t.totaal;
  return `
    <div class="ibn-sec" id="sec-${s.id}">
      <div class="ibn-sec-head">
        <div class="ibn-sec-id ${klaar ? 'klaar' : ''}">${s.id}</div>
        <div class="ibn-sec-titel">${s.titel}</div>
        <div class="ibn-sec-prog ${klaar ? 'klaar' : ''}">${t.done + t.nvt} / ${t.totaal}</div>
      </div>
      <div class="ibn-tbl">
        <div class="ibn-tbl-head">
          <span>Item</span><span></span><span>OK</span><span>N.v.t.</span>
        </div>
        ${s.items.map(it => renderRij(it)).join('')}
      </div>
    </div>
  `;
}

function renderRij(it) {
  const check  = state.checks[it.id];
  const status = check?.status || '';
  const mont   = check?.monteur || '';
  const ts     = check?.ts ? new Date(check.ts).toLocaleString('nl-NL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
  const note   = state.notes[it.id] || '';
  const rijCls = status === 'ok' ? 'is-ok' : status === 'nvt' ? 'is-nvt' : '';
  return `
    <div class="ibn-row ${rijCls}" id="row-${it.id}">
      <div class="ibn-row-content">
        <div class="ibn-desc">${it.desc}</div>
        ${it.sub ? `<div class="ibn-sub">${it.sub}</div>` : ''}
        <div class="ibn-stempel">${mont ? `✓ ${mont} · ${ts}` : ''}</div>
      </div>
      <button class="ibn-note-btn ${note ? 'heeft-note' : ''}" title="Opmerking"
              onclick="toggleNote('${it.id}')">✎</button>
      <div class="ibn-chk-col">
        <div class="ibn-chk ibn-chk-ok ${status === 'ok' ? 'actief' : ''}"
             title="Akkoord" onclick="vink('${it.id}','ok')">✓</div>
      </div>
      <div class="ibn-chk-col">
        <div class="ibn-chk ibn-chk-nvt ${status === 'nvt' ? 'actief' : ''}"
             title="Niet van toepassing" onclick="vink('${it.id}','nvt')">—</div>
      </div>
    </div>
    <div class="ibn-note-row ${note ? 'open' : ''}" id="note-${it.id}">
      <textarea class="ibn-note-ta" id="ta-${it.id}"
        placeholder="Opmerking bij dit item…"
        oninput="slaNotaOp('${it.id}', this.value)">${note}</textarea>
    </div>
  `;
}

function gateStempel(gs) {
  if (!gs || !gs.tester) return '';
  const ts = gs.ts ? new Date(gs.ts).toLocaleString('nl-NL', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
  return `${gs.tester}${ts ? ' · ' + ts : ''}`;
}

function renderGate(faseId, gate, gs) {
  const besluit = gs && gs.besluit;
  const cls = besluit === 'go' ? 'go-gate' : besluit === 'nogo' ? 'nogo-gate' : '';
  const esc = BFTToolShell.esc;
  const stempel = gateStempel(gs);
  return `
    <div class="ibn-gate ${cls}" id="gate-${faseId}">
      <div class="ibn-gate-tekst">
        <div class="ibn-gate-label">${esc(gate.label)}</div>
        <div class="ibn-gate-sub">${esc(gate.sub)}</div>
        ${besluit === 'nogo' && gs.reden ? `<div class="ibn-gate-sub" style="color:var(--danger)">Reden NOGO: ${esc(gs.reden)}</div>` : ''}
        ${stempel ? `<div class="ibn-gate-sub">✓ ${esc(stempel)}</div>` : ''}
      </div>
      ${besluit
        ? `<span class="ibn-gate-status ${besluit}">${besluit.toUpperCase()}</span>
           <button class="btn-nogo" onclick="setGate(${faseId}, null)" style="font-size:10px;padding:5px 10px">Wijzigen</button>`
        : `<button class="btn-go"   onclick="setGate(${faseId},'go')">GO</button>
           <button class="btn-nogo" onclick="setGate(${faseId},'nogo')">NOGO</button>`
      }
    </div>
  `;
}

/* ================================================================
   ACTIES
   ================================================================ */
function vink(id, modus) {
  if (!monteurNaam) {
    if (window.BFTDialog) BFTDialog.alert('Vul eerst de tester-naam in bij Machine-identificatie.');
    else alert('Vul eerst de tester-naam in.');
    return;
  }
  const huidig = state.checks[id]?.status;
  if (huidig === modus) delete state.checks[id];
  else state.checks[id] = { status: modus, monteur: monteurNaam, ts: new Date().toISOString() };
  slaOp();
  updateRij(id);
  updateVoortgang();
  renderSidebar();
  renderFaseNav();
}

function toggleNote(id) {
  document.getElementById('note-' + id)?.classList.toggle('open');
}

function slaNotaOp(id, tekst) {
  if (tekst.trim()) state.notes[id] = tekst;
  else delete state.notes[id];
  slaOp();
  const btn = document.querySelector(`#row-${id} .ibn-note-btn`);
  if (btn) btn.classList.toggle('heeft-note', !!tekst.trim());
}

function faseOpenItems(fase) {
  let open = 0;
  (fase.sections || []).forEach(s => s.items.forEach(it => { if (!state.checks[it.id]?.status) open++; }));
  return open;
}

function setGate(faseId, besluit) {
  /* Wijzigen / wissen */
  if (besluit === null) { delete state.gates[faseId]; naGate(faseId); return; }

  /* Gate-beslissing vereist een tester (zoals een afvink-stempel) */
  if (!monteurNaam) {
    if (window.BFTDialog) BFTDialog.alert('Vul eerst de tester-naam in bij Machine-identificatie.');
    else alert('Vul eerst de tester-naam in.');
    return;
  }

  const fase = FASEN.find(f => f.id === faseId);

  if (besluit === 'go') {
    const open = fase ? faseOpenItems(fase) : 0;
    if (open > 0 && !confirm(`Deze fase heeft nog ${open} open item(s).\nGO geven betekent vrijgave ondanks openstaande punten. Toch GO?`)) return;
    state.gates[faseId] = { besluit: 'go', tester: monteurNaam, ts: new Date().toISOString(), reden: '' };
  } else { /* nogo — reden verplicht */
    const reden = (prompt('Reden voor NOGO (verplicht):') || '').trim();
    if (!reden) return;
    state.gates[faseId] = { besluit: 'nogo', tester: monteurNaam, ts: new Date().toISOString(), reden: reden };
  }
  naGate(faseId);
}

function naGate(faseId) {
  slaOp();
  const gate = FASEN.find(f => f.id === faseId)?.gate;
  const el = document.getElementById('gate-' + faseId);
  if (el && gate) el.outerHTML = renderGate(faseId, gate, state.gates[faseId] || null);
  renderFaseNav();
}

function updateRij(id) {
  const oudeRij = document.getElementById('row-' + id);
  if (!oudeRij) return;
  const fase = FASEN.find(f => f.sections.some(s => s.items.some(it => it.id === id)));
  const item = fase?.sections.flatMap(s => s.items).find(it => it.id === id);
  if (!item) return;
  const div = document.createElement('div');
  div.innerHTML = renderRij(item);
  oudeRij.replaceWith(div.firstElementChild);
}

function resetProtocol() {
  const fn = () => { state = { checks:{}, notes:{}, gates:{}, machineInfo:{chassis:'',tester:'',locatie:'',datum:''} }; slaOp(); switchFase(0); renderFaseNav(); };
  if (window.BFTDialog) BFTDialog.confirm('Protocol leegmaken?','Alle vinkjes, gates en notities worden gewist.', {labelOk:'Leegmaken'}).then(ok => { if (ok) fn(); });
  else { if (confirm('Protocol leegmaken?')) fn(); }
}

/* ================================================================
   OPSLAAN
   ================================================================ */
function slaOp() {
  if (!huidigProject) return;
  try { localStorage.setItem('bft_v2_ibn_' + huidigProject, JSON.stringify(state)); } catch(e){}
  try {
    let totaal = 0, gedaan = 0;
    FASEN.filter(f => f.type !== 'info').forEach(f =>
      f.sections.forEach(s => s.items.forEach(it => {
        totaal++;
        const st = state.checks[it.id]?.status;
        if (st === 'ok' || st === 'nvt') gedaan++;
      }))
    );
    const pct = totaal > 0 ? Math.round(gedaan / totaal * 100) : 0;
    localStorage.setItem('bft_v2_snap_ibn_' + huidigProject,
      JSON.stringify({ pct, openItems: totaal - gedaan, updated: new Date().toISOString() }));
  } catch(e) {}
  const ind = document.getElementById('saveInd');
  ind.classList.add('zichtbaar');
  clearTimeout(ind._t);
  ind._t = setTimeout(() => ind.classList.remove('zichtbaar'), 1800);
}

/* ================================================================
   VOORTGANG
   ================================================================ */
function updateVoortgang() {
  let totaal = 0, gedaan = 0;
  FASEN.filter(f => f.type !== 'info').forEach(f =>
    f.sections.forEach(s => s.items.forEach(it => {
      totaal++;
      const st = state.checks[it.id]?.status;
      if (st === 'ok' || st === 'nvt') gedaan++;
    }))
  );
  const open = totaal - gedaan;
  const pct  = totaal > 0 ? Math.round(gedaan / totaal * 100) : 0;
  BFTToolShell.setRing(document.getElementById('progCircle'), document.getElementById('progPct'), pct);
  const btn = document.getElementById('pdfBtn');
  if (open > 0) {
    document.getElementById('footerStatus').innerHTML =
      `${gedaan} / ${totaal} items · <span style="color:var(--danger);font-weight:600">${open} open</span>`;
    if (btn) { btn.style.opacity = '0.5'; btn.title = `Nog ${open} open items`; }
  } else {
    document.getElementById('footerStatus').textContent = `${gedaan} / ${totaal} — klaar voor export`;
    if (btn) { btn.style.opacity = '1'; btn.title = ''; }
  }
}

/* ================================================================
   PDF EXPORT
   ================================================================ */

function exportPDF() {
  if (!huidigProject) return;
  const m     = state.machineInfo;
  const proj  = BFTToolShell.getProject(huidigProject) || {};
  const datum = new Date().toISOString().slice(0,10);
  const titel = `IBN Testprotocol — ${huidigProject}`;

  const content = [];
  const infoRijen = [
    ['Project',       huidigProject],
    ['Machine',       proj.naam    || '—'],
    ['Chassis-nr',    m.chassis    || '—'],
    ['Klant',         proj.klant   || '—'],
    ['Tester',        m.tester     || '—'],
    ['Testdatum',     m.datum      || '—'],
    ['Afgedrukt op',  datum]
  ];
  content.push({
    table: { widths:[130,'*'], body: infoRijen.map(r => [
      { text:r[0], fontSize:9, color:'#7a849a', bold:true, margin:[0,3,0,3] },
      { text:r[1], fontSize:10, color:'#1a1f2e', margin:[0,3,0,3] }
    ])}, layout:'noBorders', margin:[0,0,0,14]
  });

  // Gate-overzicht
  const gatesFasen = FASEN.filter(f => f.gate);
  content.push({ text:'Gate-overzicht', fontSize:11, bold:true, margin:[0,0,0,4] });
  content.push({ canvas:[{type:'rect',x:0,y:0,w:515,h:2,color:'#e8a000'}], margin:[0,0,0,6] });
  content.push({
    table: { widths:[50,'*',50], body:[
      [{text:'Gate',fontSize:8,color:'#7a849a',bold:true,fillColor:'#f8f9fa'},
       {text:'Omschrijving',fontSize:8,color:'#7a849a',bold:true,fillColor:'#f8f9fa'},
       {text:'Status',fontSize:8,color:'#7a849a',bold:true,fillColor:'#f8f9fa',alignment:'center'}],
      ...gatesFasen.map(f => {
        const gs = state.gates[f.id] || null;
        const besluit = gs && gs.besluit;
        const txt = besluit === 'go' ? 'GO' : besluit === 'nogo' ? 'NOGO' : '-';
        const kleur = besluit === 'go' ? '#1e9e5e' : besluit === 'nogo' ? '#d63030' : '#7a849a';
        const stempel = gateStempel(gs);
        const labelParts = [{ text: f.gate.label, fontSize:8, color:'#1a1f2e' }];
        if (besluit === 'nogo' && gs.reden) labelParts.push({ text:`\nReden NOGO: ${gs.reden}`, fontSize:7, color:'#d63030', italics:true });
        return [
          {text:`Gate ${f.id}`, fontSize:8, color:'#7a849a'},
          {text: labelParts},
          {text: stempel ? [{text:txt+'\n', bold:true, color:kleur}, {text:stempel, fontSize:6, color:'#7a849a'}] : txt, fontSize:8, bold:true, color:kleur, alignment:'center'}
        ];
      })
    ]}, layout:'lightHorizontalLines', margin:[0,0,0,16]
  });

  // Fasen
  FASEN.filter(f => f.type !== 'info').forEach((fase, idx) => {
    content.push({
      text:`${fase.id === 7 ? '' : 'Fase '+fase.id+' — '}${fase.titel}`,
      fontSize:11, bold:true, color:'#1a1f2e',
      margin:[0, idx === 0 ? 0 : 10, 0, 3],
      pageBreak: idx > 0 && idx % 3 === 0 ? 'before' : undefined
    });
    content.push({ canvas:[{type:'rect',x:0,y:0,w:515,h:2,color:'#e8a000'}], margin:[0,0,0,4] });

    fase.sections.forEach(s => {
      content.push({ text:`${s.id} — ${s.titel}`, fontSize:9, bold:true, color:'#3d4558', margin:[0,6,0,3] });
      const body = [[
        {text:'Item',fontSize:8,color:'#7a849a',bold:true,fillColor:'#f8f9fa'},
        {text:'Omschrijving',fontSize:8,color:'#7a849a',bold:true,fillColor:'#f8f9fa'},
        {text:'Monteur',fontSize:8,color:'#7a849a',bold:true,fillColor:'#f8f9fa',alignment:'center'},
        {text:'Status',fontSize:8,color:'#7a849a',bold:true,fillColor:'#f8f9fa',alignment:'center'}
      ]];
      s.items.forEach(it => {
        const c = state.checks[it.id];
        const stt = c?.status || '';
        const txt = stt === 'ok' ? 'OK' : stt === 'nvt' ? 'N.v.t.' : '-';
        const klr = stt === 'ok' ? '#1e9e5e' : stt === 'nvt' ? '#7a849a' : '#d63030';
        const note = state.notes[it.id] ? `\n${state.notes[it.id]}` : '';
        body.push([
          {text:it.id, fontSize:8, color:'#7a849a'},
          {text:[{text:it.desc,fontSize:8,color:'#1a1f2e'}, it.sub?{text:'\n'+it.sub,fontSize:7,color:'#7a849a'}:'', note?{text:note,fontSize:7,color:'#7a5a00',italics:true}:'']},
          {text:c?.monteur||'',fontSize:8,color:'#3d4558',alignment:'center'},
          {text:txt,fontSize:8,bold:true,color:klr,alignment:'center'}
        ]);
      });
      content.push({ table:{widths:[44,'*',60,36],body}, layout:'lightHorizontalLines', margin:[0,0,0,4] });
    });
  });

  // Handtekening
  content.push({ text:'Akkoord oplevering', fontSize:11, bold:true, margin:[0,18,0,4] });
  content.push({ canvas:[{type:'rect',x:0,y:0,w:515,h:2,color:'#e8a000'}], margin:[0,0,0,10] });
  content.push({ table:{ widths:['*','*'], body:[
    [{text:'Tester',fontSize:9,color:'#7a849a',bold:true,border:[false,false,false,false]},
     {text:'Datum',fontSize:9,color:'#7a849a',bold:true,border:[false,false,false,false]}],
    [{text:m.tester||'________________________',fontSize:10,color:'#1a1f2e',margin:[0,2,0,20],border:[false,false,false,true]},
     {text:m.datum ||'________________________',fontSize:10,color:'#1a1f2e',margin:[0,2,0,20],border:[false,false,false,true]}]
  ]}, layout:{defaultBorder:false}});

  const btn = document.getElementById('pdfBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Bezig…'; }
  try {
    pdfMake.createPdf({
      pageMargins:[40,88,40,40],
      defaultStyle:{fontSize:10,lineHeight:1.3,color:'#3d4558'},
      header: BFTPdf.header(titel),
      footer: BFTPdf.footer(titel),
      content
    }).download(`BFT_IBN_${huidigProject}_${datum}.pdf`, () => {
      if (btn) { btn.disabled = false; btn.textContent = '↓ PDF'; }
    });
  } catch(err) {
    console.error('PDF fout:', err);
    if (btn) { btn.disabled = false; btn.textContent = '↓ PDF'; }
  }
}
</script>
</body>
</html>
