<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWE-XML → IBN — Proof of Concept</title>
<style>
  :root{ --zwart:#111; --goud:#e8a000; --blauw:#1a6ec7; --groen:#1e9e5e; --grijs:#7a849a;
         --bg:#f4f5f7; --surface:#fff; --border:#e1e4e8; --text:#1a1f2e; --text2:#3d4558; }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  header{background:var(--zwart);color:#fff;padding:14px 22px;border-bottom:3px solid var(--goud);display:flex;align-items:baseline;gap:14px}
  header h1{font-size:16px;margin:0;font-weight:700}
  header span{font-size:11px;color:#c9ccd2;font-family:ui-monospace,monospace}
  .wrap{max-width:1080px;margin:0 auto;padding:20px 22px 80px}
  .drop{border:2px dashed var(--blauw);border-radius:10px;background:rgba(26,110,199,0.05);padding:26px;text-align:center;cursor:pointer;transition:.15s}
  .drop:hover,.drop.over{background:rgba(26,110,199,0.12)}
  .drop b{color:var(--blauw)}
  .files{font-family:ui-monospace,monospace;font-size:11px;color:var(--grijs);margin:10px 0 0}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:9px;margin-top:18px;overflow:hidden}
  .card-kop{padding:11px 16px;background:#fafbfc;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .card-kop h2{font-size:14px;margin:0;flex:1}
  .badge{font-family:ui-monospace,monospace;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--blauw);color:#fff}
  .badge.g{background:var(--groen)} .badge.o{background:var(--goud)}
  .card-body{padding:14px 16px;max-height:340px;overflow:auto}
  .lijst{columns:2;column-gap:24px;font-size:13px;line-height:1.7}
  .lijst div{break-inside:avoid}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{text-align:left;padding:4px 8px;border-bottom:1px solid var(--border);vertical-align:top}
  th{font-family:ui-monospace,monospace;font-size:10px;color:var(--grijs);position:sticky;top:0;background:#fafbfc}
  .mono{font-family:ui-monospace,monospace}
  .tag{display:inline-block;font-family:ui-monospace,monospace;font-size:11px;background:#eef1f5;border-radius:4px;padding:1px 6px;margin:1px}
  .hint{font-size:12px;color:var(--grijs);margin:4px 0 0}
  .btn{font:inherit;font-size:12px;border:1px solid var(--border);background:#fff;border-radius:6px;padding:5px 11px;cursor:pointer}
  .btn:hover{background:#f0f2f5}
  .leeg{color:var(--grijs);font-style:italic}
  .warn{color:#d63030}
</style>
</head>
<body>
<header>
  <h1>SWE-XML → IBN</h1><span>Proof of Concept · deterministische parser</span>
</header>

<div class="wrap">
  <div class="drop" id="drop">
    <div style="font-size:30px">📥</div>
    <div>Sleep de <b>LOGO!Soft CSV's</b> + <b>SWE-XML's</b> hierheen of <b>klik om te kiezen</b></div>
    <div class="hint">Logo1-4.csv (primaire I/O-bron) · BOM · List of wires · Locations — één machine per keer</div>
    <input type="file" id="file" accept=".xml,.csv" multiple hidden>
    <div class="files" id="files"></div>
  </div>
  <div id="uit"></div>
</div>

<script>
'use strict';
const $ = s => document.querySelector(s);
const drop = $('#drop'), inp = $('#file');

drop.onclick = () => inp.click();
['dragover','dragenter'].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add('over'); }));
['dragleave','drop'].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', ev => verwerk(ev.dataTransfer.files));
inp.onchange = () => verwerk(inp.files);

/* ── XML → array van rij-objecten (veld → tekst) ── */
function parseRows(xmlText){
  const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
  if (doc.querySelector('parsererror')) return [];
  return Array.from(doc.querySelectorAll('Root > Row')).map(row => {
    const o = {};
    Array.from(row.children).forEach(c => { o[c.tagName] = (c.textContent || '').trim(); });
    return o;
  });
}

/* ── Type herkennen aan de aanwezige kolommen ── */
function typeVan(rows){
  if (!rows.length) return 'leeg';
  const k = Object.keys(rows[0]);
  if (k.includes('Origin') && k.includes('Line_style')) return 'wires';
  if (k.includes('Location_Mark')) return 'locations';
  if (k.includes('Mark') && k.includes('Reference')) return 'bom';
  return 'overig';
}

/* ── LOGO!Soft CSV (Connector,name) → benoemde I/O met klem/richting/soort ── */
function parseLogo(txt){
  const io = [];
  txt.split(/\r?\n/).slice(1).forEach(line => {
    const m = line.match(/^([^,]+),"?\s*(.*?)\s*"?$/);
    if (!m) return;
    const klem = m[1].replace(/^﻿/,'').trim(), functie = (m[2]||'').trim();
    if (!functie) return;                       // lege connector overslaan
    const mm = klem.match(/^(A?)(I|Q)(\d+)$/);  // I, Q, AI, AQ — rest (M/N/X/C/F/S) overslaan
    if (!mm) return;
    io.push({ klem, functie, richting: mm[2]==='I'?'in':'uit', soort: mm[1]==='A'?'analoog':'digitaal' });
  });
  return io;
}
function normF(s){ return String(s||'').toLowerCase().replace(/[!"]/g,'').replace(/\s+/g,' ').trim(); }

const data = { bom:[], wires:[], locations:[], overig:[], logo:{}, bestanden:[] };

async function verwerk(fileList){
  for (const f of fileList){
    const txt = await f.text();
    if (/\.csv$/i.test(f.name) || /^﻿?Connector,name/.test(txt)) {
      const ctrl = f.name.replace(/\.[^.]+$/,'');
      data.logo[ctrl] = parseLogo(txt);
      data.bestanden.push({ naam:f.name, type:'logo', n:data.logo[ctrl].length });
      continue;
    }
    const rows = parseRows(txt);
    const t = typeVan(rows);
    data.bestanden.push({ naam:f.name, type:t, n:rows.length });
    if (data[t]) data[t] = data[t].concat(rows);
  }
  $('#files').textContent = data.bestanden.map(b => `${b.naam} → ${b.type} (${b.n})`).join('   ·   ');
  render();
}

/* ── Component-marks uit een "Mark"-veld (kan meerdere bevatten) ── */
function marks(s){ return (s||'').split(',').map(x => x.trim()).filter(Boolean); }
function prefix(m){ const x = m.match(/^-?([A-Za-z]+)/); return x ? x[1].toUpperCase() : '?'; }

/* ── Functie-label uit een wire-endpoint (na laatste ':') ── */
function functieLabel(addr){
  if (!addr || addr.indexOf(':') < 0) return null;
  const lab = addr.slice(addr.lastIndexOf(':') + 1).trim();
  if (lab.length < 3) return null;          // A1, A2, 86…
  if (/^\d/.test(lab)) return null;         // draadnr/kleur/CAN: "14 WH", "1 (BN)", "11 CAN HI"
  if (/^[A-Z]?\d+$/.test(lab)) return null; // klemnummers
  if (!/[a-z]/.test(lab)) return null;      // all-caps codes: "WH", "CAN HI", "PE"
  return lab;
}

function render(){
  let h = '';

  /* ⓛ — I/O PER LOGO-CONTROLLER (primaire bron, uit CSV) */
  const ctrls = Object.keys(data.logo).sort();
  if (ctrls.length) {
    let totLogo = 0; ctrls.forEach(c => totLogo += data.logo[c].length);
    h += kaart('🔌 I/O per LOGO-controller — primaire bron', totLogo + ' I/O', 'g',
      `<div class="hint">Uit LOGO!Soft CSV: klem · richting · functie per controller. Klaar voor io.json.</div>
       <button class="btn" onclick="kopieerLogo()" style="margin:8px 0">⧉ Kopieer als io.json</button>` +
      ctrls.map(c => {
        const io = data.logo[c];
        const t = (r,s) => io.filter(x => x.richting===r && x.soort===s).length;
        return `<div style="margin:10px 0;border-top:1px solid var(--border);padding-top:8px">
          <b class="mono">${esc(c)}</b>
          <span class="hint" style="display:inline">DI ${t('in','digitaal')} · AI ${t('in','analoog')} · DQ ${t('uit','digitaal')} · AQ ${t('uit','analoog')}</span>
          <table style="margin-top:4px"><tr><th>Klem</th><th>Richting</th><th>Functie</th></tr>${
            io.map(x => `<tr><td class="mono">${esc(x.klem)}</td>
              <td><span class="tag">${x.richting==='in'?'◀ in':'▶ uit'}${x.soort==='analoog'?' ~':''}</span></td>
              <td>${esc(x.functie)}</td></tr>`).join('')}</table>
        </div>`;
      }).join(''));

    /* ✓ — MACHINE-VERIFICATIE (zelfde machine?) */
    h += kaart('✓ Machine-verificatie', '', '', verificatieHtml(ctrls));
  }

  /* Afgeleide data: LOGO-type per mark, I/O per module/locatie, componenten per locatie */
  const logoT = {};
  data.bom.forEach(r => { if (/LOGO/i.test(r.Description||'')) marks(r.Mark).forEach(m => logoT[m] = r.Description); });
  function modType(desc){
    if (/AM2 AQ/i.test(desc||'')) return {lab:'analoog uit', k:'o'};
    if (/AM2/i.test(desc||''))    return {lab:'analoog in',  k:'o'};
    if (/DM16|RCE|LOGO/i.test(desc||'')) return {lab:'digitaal', k:'g'};
    return {lab:'overig', k:''};
  }
  const perMod = {}, ioPerLoc = {}, cmpPerLoc = {};
  data.wires.forEach(w => [w.Origin, w.Destination].forEach(ep => {
    const m = (ep||'').match(/\+(L\d+)-(J\d+):(.+)$/);
    if (m && functieLabel(':' + m[3].trim()) !== null) {
      const loc = m[1], mod = '-' + m[2], lab = m[3].trim();
      (perMod[mod] = perMod[mod] || new Set()).add(lab);
      (ioPerLoc[loc] = ioPerLoc[loc] || new Set()).add(mod + '|' + lab);
    }
    const re = /\+(L\d+)-([A-Za-z]+\d+)/g; let x;
    while ((x = re.exec(ep||''))) (cmpPerLoc[x[1]] = cmpPerLoc[x[1]] || new Set()).add(x[2]);
  }));
  const totIO = new Set(); Object.values(perMod).forEach(s => s.forEach(l => totIO.add(l)));

  /* ① — I/O PER LOGO-MODULE (read-only) */
  const mods = Object.keys(perMod).sort((a,b) => (+a.replace(/\D/g,'')) - (+b.replace(/\D/g,'')));
  h += kaart('① I/O per LOGO-module', totIO.size + ' functies', 'g',
    mods.length
      ? `<div class="hint">Read-only capaciteit-overzicht. Type (digitaal / analoog) afgeleid uit de BOM-modulebeschrijving.</div>
         <button class="btn" onclick="kopieer()" style="margin:8px 0">⧉ Kopieer alle I/O</button>` +
        mods.map(mod => {
          const t = modType(logoT[mod]);
          const labs = [...perMod[mod]].sort((a,b)=>a.localeCompare(b,'nl'));
          return `<div style="margin:10px 0;border-top:1px solid var(--border);padding-top:8px">
            <span class="badge ${t.k}">${esc(t.lab)}</span>
            <b class="mono">${esc(mod)}</b>
            <span class="hint" style="display:inline">${esc(logoT[mod]||'overig device')} · ${labs.length} punten</span>
            <div class="lijst" style="margin-top:4px">${labs.map(l=>`<div class="io-lbl">• ${esc(l)}</div>`).join('')}</div>
          </div>`;
        }).join('')
      : '<div class="leeg">Nog geen wires geladen.</div>');

  /* ② — I/O & COMPONENTEN PER LOCATIE (read-only) */
  const locDesc = {}; data.locations.forEach(l => locDesc[(l.Location_Mark||'').replace(/^\+/,'')] = l.Description);
  const locKeys = [...new Set([...Object.keys(ioPerLoc), ...Object.keys(cmpPerLoc)])].sort((a,b)=>(+a.slice(1))-(+b.slice(1)));
  h += kaart('② Per locatie — I/O & componenten', locKeys.length + ' locaties', '',
    locKeys.length
      ? `<table><tr><th>Locatie</th><th>Omschrijving</th><th>I/O-punten</th><th>Componenten</th></tr>${
          locKeys.map(l => `<tr><td class="mono">+${esc(l)}</td><td>${esc(locDesc[l]||'—')}</td>
            <td>${ioPerLoc[l]?ioPerLoc[l].size:0}</td><td>${cmpPerLoc[l]?cmpPerLoc[l].size:0}</td></tr>`).join('')}</table>`
      : '<div class="leeg">Geen locatie-data.</div>');

  /* 3 — COMPONENT-INVENTARIS per klasse */
  const perKlasse = {};
  let totaal = 0;
  data.bom.forEach(r => marks(r.Mark).forEach(m => {
    const p = prefix(m); (perKlasse[p] = perKlasse[p] || []).push({m, d:r.Description, ref:r.Reference}); totaal++;
  }));
  const klassen = Object.keys(perKlasse).sort();
  h += kaart('③ Component-inventaris (per klasse)', totaal + ' marks', '',
    klassen.length
      ? `<div class="hint">Marks geëxpandeerd uit samengestelde BOM-rijen.</div>` +
        klassen.map(k => `<div style="margin:8px 0"><span class="badge">${k}</span> <b>${perKlasse[k].length}</b>
          <div>${[...new Set(perKlasse[k].map(x=>x.m))].sort().map(m=>`<span class="tag">${esc(m)}</span>`).join('')}</div></div>`).join('')
      : '<div class="leeg">Geen BOM geladen.</div>');

  /* 4 — LOCATIES */
  h += kaart('④ Locaties', data.locations.length, '',
    data.locations.length
      ? `<table><tr><th>Mark</th><th>Omschrijving</th></tr>${data.locations
          .map(l => `<tr><td class="mono">${esc(l.Location_Mark)}</td><td>${esc(l.Description)}</td></tr>`).join('')}</table>`
      : '<div class="leeg">Geen locations geladen.</div>');

  /* 5 — VALIDATIE-HOOK (signalering grote componenten) */
  const motoren = [...new Set(data.bom.flatMap(r => marks(r.Mark)).filter(m => /^-?M\d/.test(m)))].sort();
  const noodstop = data.bom.filter(r => /emergency|noodstop/i.test(r.Description||'')).flatMap(r=>marks(r.Mark));
  h += kaart('⑤ Signalering grote componenten (validatie-aanzet)', motoren.length + noodstop.length, '',
    `<div><b>Motoren:</b> ${motoren.length ? motoren.map(m=>`<span class="tag">${esc(m)}</span>`).join('') : '<span class="leeg">—</span>'}</div>
     <div style="margin-top:6px"><b>Noodstop-gerelateerd:</b> ${noodstop.length ? [...new Set(noodstop)].map(m=>`<span class="tag">${esc(m)}</span>`).join('') : '<span class="leeg">—</span>'}</div>
     <div class="hint">Volgende stap: kruisen met het FASEN-protocol → meld wat het protocol niet test.</div>`);

  $('#uit').innerHTML = h;
}

function kaart(titel, badge, kleur, body){
  return `<div class="card"><div class="card-kop"><h2>${titel}</h2><span class="badge ${kleur}">${badge}</span></div>
    <div class="card-body">${body}</div></div>`;
}
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function kopieer(){
  const set = new Set([...document.querySelectorAll('.io-lbl')].map(d => d.textContent.replace(/^•\s*/,'').trim()));
  const t = [...set].sort((a,b)=>a.localeCompare(b,'nl')).join('\n');
  navigator.clipboard.writeText(t).then(()=>alert('I/O-lijst gekopieerd ('+set.size+' unieke functies)'));
}

/* Verificatie: dubbele controllers + kruischeck LOGO ↔ SWE-XML */
function verificatieHtml(ctrls){
  const out = [];
  /* a) dubbele/zelfde controller (hoge onderlinge functie-overlap) */
  const dup = [];
  for (let i=0;i<ctrls.length;i++) for (let j=i+1;j<ctrls.length;j++){
    const A = new Set(data.logo[ctrls[i]].map(x=>normF(x.functie)));
    const B = data.logo[ctrls[j]].map(x=>normF(x.functie));
    if (!A.size || !B.length) continue;
    const inter = B.filter(x=>A.has(x)).length;
    const ratio = inter / Math.min(A.size, B.length);
    if (ratio > 0.6) dup.push(`${ctrls[i]} ↔ ${ctrls[j]} (${Math.round(ratio*100)}% gelijk)`);
  }
  out.push(dup.length
    ? `<div class="warn">⚠ Mogelijk dezelfde controller dubbel: ${dup.join(', ')} — upload je niet per ongeluk één CSV 2×?</div>`
    : `<div style="color:var(--groen)">✓ ${ctrls.length} onderscheidende controllers — geen dubbele I/O-sets.</div>`);
  /* b) kruischeck LOGO ↔ SWE-XML (zelfde machine?) */
  if (data.wires.length){
    const xml = new Set();
    data.wires.forEach(w => [w.Origin, w.Destination].forEach(a => {
      if ((a||'').indexOf(':')>=0){ const l = a.slice(a.lastIndexOf(':')+1).trim(); if (/[a-z]/.test(l) && !/^\d/.test(l)) xml.add(normF(l)); }
    }));
    const logoSet = new Set(); ctrls.forEach(c => data.logo[c].forEach(x => logoSet.add(normF(x.functie))));
    const inter = [...logoSet].filter(x=>xml.has(x)).length;
    const pct = logoSet.size ? Math.round(inter/logoSet.size*100) : 0;
    out.push(pct >= 15
      ? `<div style="color:var(--groen);margin-top:6px">✓ LOGO ↔ SWE-XML overlap: ${inter} functies (${pct}%) — bronnen lijken van <b>dezelfde machine</b>.</div>`
      : `<div class="warn" style="margin-top:6px">⚠ Lage LOGO↔XML overlap (${pct}%) — mogelijk <b>verschillende machines</b>? Controleer de bestanden.</div>`);
  } else {
    out.push(`<div class="hint" style="margin-top:6px">Laad ook de SWE-XML (List of wires) voor een kruischeck LOGO ↔ bedrading.</div>`);
  }
  return out.join('');
}

/* I/O → io.json-concept (stabiele id = controller-klem) */
function kopieerLogo(){
  const io = [];
  Object.keys(data.logo).sort().forEach(c => data.logo[c].forEach(x =>
    io.push({ id:`${c}-${x.klem}`, controller:c, klem:x.klem, richting:x.richting, soort:x.soort, functie:x.functie })));
  const json = JSON.stringify({ machineId:'', schemaVersion:1, bron:'LOGO!Soft CSV', io }, null, 2);
  navigator.clipboard.writeText(json).then(()=>alert('io.json gekopieerd ('+io.length+' I/O-punten)'));
}
</script>
</body>
</html>
